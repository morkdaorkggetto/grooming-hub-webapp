<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Grooming Hub · Prototipo cliccabile</title>
<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ede9e4; }
  body { font-family: var(--font-sans); color: var(--color-text-primary); }
  #root { height: 100vh; }
  input, button, textarea { font-family: inherit; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Custom scrollbars, softer */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(43, 37, 37, 0.12); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(43, 37, 37, 0.2); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="proto/proto-core.jsx"></script>
<script type="text/babel" src="proto/proto-auth.jsx"></script>
<script type="text/babel" src="proto/proto-dashboard.jsx"></script>
<script type="text/babel" src="proto/proto-booking.jsx"></script>
<script type="text/babel" src="proto/proto-shop.jsx"></script>
<script type="text/babel" src="proto/proto-profile.jsx"></script>

<script type="text/babel" data-presets="react">
  const Root = () => (
    <AppProvider>
      <AppShell/>
    </AppProvider>
  );
  ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>

</html>
